[supervisord]
nodaemon=true
logfile=/var/log/supervisor/task8-supervisord.log
pidfile=/tmp/task8-supervisord.pid

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/xvfb.log
stderr_logfile=/var/log/supervisor/xvfb.err.log

[program:fluxbox]
command=/bin/bash -lc 'until [ -e /tmp/.X11-unix/X1 ]; do sleep 1; done; exec fluxbox'
environment=DISPLAY=":1",HOME="/root"
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/fluxbox.log
stderr_logfile=/var/log/supervisor/fluxbox.err.log

[program:x11vnc]
command=/bin/bash -lc 'until [ -e /tmp/.X11-unix/X1 ]; do sleep 1; done; exec x11vnc -display :1 -forever -shared -nopw -xkb -rfbport 5900 -listen 0.0.0.0'
environment=DISPLAY=":1"
autostart=true
autorestart=true
priority=30
stdout_logfile=/var/log/supervisor/x11vnc.log
stderr_logfile=/var/log/supervisor/x11vnc.err.log

[program:websockify]
command=/bin/bash -lc 'until (echo > /dev/tcp/127.0.0.1/5900) >/dev/null 2>&1; do sleep 1; done; exec websockify --web=/usr/share/novnc/ 6080 localhost:5900'
autostart=true
autorestart=true
priority=40
stdout_logfile=/var/log/supervisor/websockify.log
stderr_logfile=/var/log/supervisor/websockify.err.log
